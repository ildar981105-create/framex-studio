<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材管理 — FrameX</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* ===== 素材管理页专属样式 ===== */

    /* 应用切换 Tab */
    .media-app-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 24px;
        flex-wrap: wrap;
    }
    .media-app-tab {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        font-size: 0.82rem;
        font-weight: 500;
        color: var(--text-muted);
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.25s;
        font-family: inherit;
    }
    .media-app-tab:hover {
        color: var(--text-primary);
        border-color: rgba(99,102,241,0.25);
    }
    .media-app-tab.active {
        color: #fff;
        background: rgba(99,102,241,0.12);
        border-color: rgba(99,102,241,0.4);
        box-shadow: 0 0 14px rgba(99,102,241,0.1);
    }
    .media-app-tab .tab-video-count {
        font-size: 0.65rem;
        font-weight: 700;
        padding: 1px 7px;
        border-radius: 100px;
        background: rgba(255,255,255,0.06);
    }
    .media-app-tab.active .tab-video-count {
        background: rgba(99,102,241,0.3);
        color: #c4b5fd;
    }

    /* 筛选工具栏 */
    .media-toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
    }
    .media-search {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 10px;
        flex: 1;
        max-width: 320px;
        transition: border-color 0.3s;
    }
    .media-search:focus-within { border-color: rgba(99,102,241,0.4); }
    .media-search svg { color: var(--text-faint); flex-shrink: 0; }
    .media-search input {
        background: none; border: none; outline: none;
        color: var(--text-primary); font-size: 0.85rem;
        flex: 1; min-width: 0;
    }
    .media-search input::placeholder { color: var(--text-faint); }

    .media-filter-group {
        display: flex;
        gap: 4px;
        background: rgba(255,255,255,0.03);
        border-radius: 10px;
        padding: 3px;
        border: 1px solid rgba(255,255,255,0.06);
    }
    .media-filter-btn {
        padding: 6px 14px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-muted);
        background: none;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        font-family: inherit;
    }
    .media-filter-btn:hover { color: var(--text-primary); }
    .media-filter-btn.active {
        color: #fff;
        background: rgba(99,102,241,0.15);
        box-shadow: 0 0 10px rgba(99,102,241,0.1);
    }

    .media-sort-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-muted);
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        margin-left: auto;
        font-family: inherit;
    }
    .media-sort-btn:hover { color: var(--text-primary); border-color: rgba(99,102,241,0.3); }

    /* 分类面包屑 */
    .media-breadcrumb {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 20px;
        font-size: 0.78rem;
        color: var(--text-muted);
    }
    .media-breadcrumb a {
        color: var(--text-muted);
        text-decoration: none;
        transition: color 0.2s;
    }
    .media-breadcrumb a:hover { color: #818cf8; }
    .media-breadcrumb .bc-sep { color: var(--text-faint); }
    .media-breadcrumb .bc-current { color: var(--text-primary); font-weight: 600; }

    /* 视频卡片网格 */
    .media-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
        margin-bottom: 32px;
    }
    .media-card {
        background: rgba(255,255,255,0.025);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 14px;
        overflow: hidden;
        transition: all 0.3s;
        cursor: pointer;
        position: relative;
    }
    .media-card:hover {
        border-color: rgba(99,102,241,0.25);
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(99,102,241,0.06);
    }
    .media-card.selected {
        border-color: rgba(99,102,241,0.5);
        box-shadow: 0 0 20px rgba(99,102,241,0.15);
    }

    /* 卡片选中 checkbox */
    .media-card-check {
        position: absolute;
        top: 10px;
        left: 10px;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(6px);
        border: 1.5px solid rgba(255,255,255,0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 3;
        opacity: 0;
        transition: all 0.2s;
        cursor: pointer;
    }
    .media-card:hover .media-card-check,
    .media-card.selected .media-card-check { opacity: 1; }
    .media-card.selected .media-card-check {
        background: #6366f1;
        border-color: #6366f1;
    }

    /* 缩略图 */
    .media-card-thumb {
        position: relative;
        aspect-ratio: 16/9;
        overflow: hidden;
        background: #0a0a16;
    }
    .media-card-thumb canvas {
        width: 100%;
        height: 100%;
        display: block;
    }
    .media-card-dur {
        position: absolute;
        bottom: 8px;
        right: 8px;
        padding: 2px 8px;
        font-size: 0.65rem;
        font-weight: 600;
        color: #fff;
        background: rgba(0,0,0,0.7);
        border-radius: 5px;
        font-family: 'JetBrains Mono', monospace;
        z-index: 2;
    }
    .media-card-res {
        position: absolute;
        top: 8px;
        right: 8px;
        padding: 2px 7px;
        font-size: 0.6rem;
        font-weight: 600;
        color: #818cf8;
        background: rgba(99,102,241,0.15);
        backdrop-filter: blur(6px);
        border-radius: 4px;
        z-index: 2;
    }

    /* Hover 遮罩按钮 */
    .media-card-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.55);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        opacity: 0;
        transition: opacity 0.25s;
        z-index: 2;
    }
    .media-card-thumb:hover .media-card-overlay { opacity: 1; }
    .media-card-overlay-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 7px 14px;
        font-size: 0.72rem;
        font-weight: 600;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
        backdrop-filter: blur(8px);
    }
    .media-card-overlay-btn--play {
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.3);
    }
    .media-card-overlay-btn--play:hover {
        background: rgba(255,255,255,0.3);
    }
    .media-card-overlay-btn--task {
        background: linear-gradient(135deg, #a855f7, #6366f1);
        box-shadow: 0 0 16px rgba(99,102,241,0.3);
    }
    .media-card-overlay-btn--task:hover {
        transform: translateY(-1px);
        box-shadow: 0 0 24px rgba(99,102,241,0.4);
    }

    /* 卡片信息 */
    .media-card-body {
        padding: 12px 14px 14px;
    }
    .media-card-name {
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .media-card-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.7rem;
        color: var(--text-muted);
    }
    .media-card-tag {
        padding: 2px 8px;
        font-size: 0.62rem;
        font-weight: 600;
        color: #06b6d4;
        background: rgba(6,182,212,0.1);
        border-radius: 4px;
    }
    .media-card-size {
        font-family: 'JetBrains Mono', monospace;
        color: var(--text-faint);
    }
    .media-card-date {
        margin-left: auto;
        color: var(--text-faint);
    }

    /* 批量操作栏 */
    .media-batch-bar {
        display: none;
        align-items: center;
        gap: 12px;
        padding: 10px 18px;
        background: rgba(99,102,241,0.08);
        border: 1px solid rgba(99,102,241,0.2);
        border-radius: 12px;
        margin-bottom: 16px;
        animation: fadeInUp 0.3s ease-out;
    }
    .media-batch-bar.visible { display: flex; }
    .media-batch-count {
        font-size: 0.82rem;
        font-weight: 600;
        color: #818cf8;
    }
    .media-batch-actions {
        display: flex;
        gap: 8px;
        margin-left: auto;
    }
    .media-batch-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 6px 14px;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-primary);
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .media-batch-btn:hover { border-color: rgba(99,102,241,0.3); }
    .media-batch-btn--primary {
        color: #fff;
        background: linear-gradient(135deg, #a855f7, #6366f1);
        border: none;
        box-shadow: 0 0 14px rgba(99,102,241,0.2);
    }
    .media-batch-btn--primary:hover { box-shadow: 0 0 24px rgba(99,102,241,0.35); }
    .media-batch-btn--danger { color: #f87171; }
    .media-batch-btn--danger:hover { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.06); }

    /* 发起任务下拉菜单 */
    .task-dropdown {
        position: relative;
        display: inline-block;
    }
    .task-dropdown-menu {
        display: none;
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        min-width: 180px;
        background: rgba(18,18,30,0.98);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 6px;
        z-index: 100;
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        backdrop-filter: blur(16px);
        animation: fadeInUp 0.2s ease-out;
    }
    .task-dropdown-menu.open { display: block; }
    .task-dropdown-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-secondary);
        border: none;
        background: none;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        text-align: left;
        font-family: inherit;
        transition: all 0.2s;
    }
    .task-dropdown-item:hover {
        color: var(--text-primary);
        background: rgba(99,102,241,0.1);
    }
    .task-dropdown-item svg { flex-shrink: 0; }

    /* 分页 */
    .media-pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin-top: 8px;
    }
    .media-page-btn {
        min-width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-muted);
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .media-page-btn:hover { color: var(--text-primary); border-color: rgba(99,102,241,0.3); }
    .media-page-btn.active {
        color: #fff;
        background: rgba(99,102,241,0.15);
        border-color: rgba(99,102,241,0.4);
    }
    .media-page-info {
        font-size: 0.72rem;
        color: var(--text-faint);
        margin-left: 12px;
    }

    /* 统计栏 */
    .media-stats-bar {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 16px 20px;
        background: rgba(255,255,255,0.025);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 14px;
        margin-bottom: 24px;
    }
    .media-stat {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .media-stat-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .media-stat-icon--purple { background: rgba(99,102,241,0.12); color: #a855f7; }
    .media-stat-icon--blue { background: rgba(59,130,246,0.12); color: #3b82f6; }
    .media-stat-icon--cyan { background: rgba(6,182,212,0.12); color: #06b6d4; }
    .media-stat-value {
        font-size: 1.1rem;
        font-weight: 800;
        font-family: 'JetBrains Mono', monospace;
    }
    .media-stat-label {
        font-size: 0.68rem;
        color: var(--text-muted);
    }
    .media-stat-divider {
        width: 1px;
        height: 28px;
        background: rgba(255,255,255,0.06);
    }

    /* 空状态 */
    .media-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 30px;
        text-align: center;
    }
    .media-empty-icon {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: rgba(99,102,241,0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        color: var(--text-faint);
    }
    .media-empty h3 {
        font-size: 1rem;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 6px;
    }
    .media-empty p {
        font-size: 0.8rem;
        color: var(--text-dim);
    }

    /* 视频预览弹窗 */
    .media-preview-modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: rgba(0,0,0,0.8);
        backdrop-filter: blur(12px);
        align-items: center;
        justify-content: center;
    }
    .media-preview-modal.open { display: flex; }
    .media-preview-content {
        width: 90%;
        max-width: 800px;
        background: rgba(18,18,30,0.98);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        overflow: hidden;
        animation: fadeInUp 0.3s ease-out;
    }
    .media-preview-video {
        aspect-ratio: 16/9;
        background: #0a0a16;
        position: relative;
    }
    .media-preview-video canvas {
        width: 100%;
        height: 100%;
        display: block;
    }
    .media-preview-close {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(0,0,0,0.5);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 5;
        transition: all 0.2s;
    }
    .media-preview-close:hover { background: rgba(239,68,68,0.5); }
    .media-preview-info {
        padding: 20px 24px;
    }
    .media-preview-title {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 8px;
    }
    .media-preview-meta {
        display: flex;
        gap: 16px;
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-bottom: 16px;
    }
    .media-preview-actions {
        display: flex;
        gap: 10px;
    }
    .media-preview-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 16px;
        font-size: 0.82rem;
        font-weight: 600;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.06);
        background: rgba(255,255,255,0.03);
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
    }
    .media-preview-btn:hover {
        border-color: rgba(99,102,241,0.3);
        background: rgba(99,102,241,0.06);
    }
    .media-preview-btn--primary {
        background: linear-gradient(135deg, #a855f7, #6366f1);
        border: none;
        color: #fff;
        box-shadow: 0 0 20px rgba(99,102,241,0.2);
    }
    .media-preview-btn--primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 0 30px rgba(99,102,241,0.35);
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
        .media-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        .media-stats-bar { flex-wrap: wrap; }
    }
    @media (max-width: 600px) {
        .media-grid { grid-template-columns: 1fr; }
        .media-toolbar { flex-direction: column; align-items: stretch; }
        .media-search { max-width: none; }
    }
    </style>
</head>

    <main class="main-content">
        <!-- 顶部栏 -->
        <header class="topbar">
            <div class="topbar-left"><h1 class="page-title">素材管理</h1></div>

    <script>
    // ===== Mock 数据 =====
    const VOD_MOCK = {

            { fileId: 'vod012', name: '产品开箱测评-智能手表.mp4', duration: 456, size: 314572800, resolution: '3840x2160', classId: 104, createTime: '2026-02-25', tags: ['测评', '4K'] }
        ]
    };

    function formatDuration(sec) {
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        const s = sec % 60;
        if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        return `${m}:${String(s).padStart(2,'0')}`;
    }
    function formatSize(bytes) {
        if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
        if (bytes >= 1048576) return (bytes / 1048576).toFixed(0) + ' MB';
        return (bytes / 1024).toFixed(0) + ' KB';
    }
    function getRes(resolution) {
        if (!resolution) return '';
        const w = parseInt(resolution);
        if (w >= 3840) return '4K';
        if (w >= 2560) return '2K';
        if (w >= 1920 || resolution.includes('1920')) return '1080p';
        if (w >= 1080 || resolution.includes('1080')) return '1080p';
        return '720p';
    }

    // ===== 渲染视频网格 =====
    const grid = document.getElementById('mediaGrid');
    const selectedCards = new Set();

    function renderGrid(list) {
        grid.innerHTML = '';
        list.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'media-card';
            card.dataset.fileId = item.fileId;
            card.innerHTML = `
                <div class="media-card-check" data-check="${item.fileId}">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="display:none;"><path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <div class="media-card-thumb">
                    <canvas width="480" height="270" data-idx="${idx}"></canvas>
                    <span class="media-card-dur">${formatDuration(item.duration)}</span>
                    <span class="media-card-res">${getRes(item.resolution)}</span>
                    <div class="media-card-overlay">
                        <button class="media-card-overlay-btn media-card-overlay-btn--play" data-action="preview" data-file-id="${item.fileId}">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M4 2L12 7L4 12V2Z" fill="currentColor"/></svg>
                            预览
                        </button>
                        <button class="media-card-overlay-btn media-card-overlay-btn--task" data-action="task" data-file-id="${item.fileId}">
                            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L8.5 4H12L9 6.2L10 9.5L7 7.5L4 9.5L5 6.2L2 4H5.5L7 1Z" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/></svg>
                            发起任务
                        </button>
                    </div>
                </div>
                <div class="media-card-body">
                    <div class="media-card-name" title="${item.name}">${item.name}</div>
                    <div class="media-card-meta">
                        ${item.tags.map(t => `<span class="media-card-tag">${t}</span>`).join('')}
                        <span class="media-card-size">${formatSize(item.size)}</span>
                        <span class="media-card-date">${item.createTime}</span>
                    </div>
                </div>
            `;
            grid.appendChild(card);

            // 绘制缩略图
            const canvas = card.querySelector('canvas');
            drawMediaThumb(canvas, idx);
        });

        // 绑定事件
        bindCardEvents();
    }

    function drawMediaThumb(canvas, idx) {
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        const hue = (idx * 47 + 200) % 360;
        const grd = ctx.createLinearGradient(0, 0, w, h);
        grd.addColorStop(0, `hsl(${hue}, 35%, 12%)`);
        grd.addColorStop(0.5, `hsl(${(hue+45)%360}, 30%, 16%)`);
        grd.addColorStop(1, `hsl(${(hue+90)%360}, 25%, 10%)`);
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, w, h);

        // 装饰图形
        ctx.globalAlpha = 0.12;
        for (let j = 0; j < 4; j++) {
            const x = (Math.sin(idx*2 + j*1.8)*0.3+0.5)*w;
            const y = (Math.cos(idx*1.5 + j*2.5)*0.3+0.5)*h;
            ctx.beginPath();
            ctx.arc(x, y, 40+j*20, 0, Math.PI*2);
            ctx.fillStyle = `hsl(${(hue+j*40)%360}, 50%, 50%)`;
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        // 播放图标
        ctx.globalAlpha = 0.08;
        ctx.beginPath();
        ctx.moveTo(w/2-20, h/2-25);
        ctx.lineTo(w/2+25, h/2);
        ctx.lineTo(w/2-20, h/2+25);
        ctx.closePath();
        ctx.fillStyle = '#fff';
        ctx.fill();
        ctx.globalAlpha = 1;
    }

    function bindCardEvents() {
        // Checkbox 点击
        document.querySelectorAll('.media-card-check').forEach(check => {
            check.addEventListener('click', function(e) {
                e.stopPropagation();
                const fileId = this.dataset.check;
                const card = this.closest('.media-card');
                const svg = this.querySelector('svg');
                if (selectedCards.has(fileId)) {
                    selectedCards.delete(fileId);
                    card.classList.remove('selected');
                    svg.style.display = 'none';
                } else {
                    selectedCards.add(fileId);
                    card.classList.add('selected');
                    svg.style.display = '';
                }
                updateBatchBar();
            });
        });

        // 预览按钮
        document.querySelectorAll('[data-action="preview"]').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const fileId = this.dataset.fileId;
                openPreview(fileId);
            });
        });

        // 发起任务按钮（卡片上的）
        document.querySelectorAll('[data-action="task"]').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const fileId = this.dataset.fileId;
                showInlineTaskMenu(this, fileId);
            });
        });
    }

    function updateBatchBar() {
        const bar = document.getElementById('mediaBatchBar');
        const count = document.getElementById('mediaBatchCount');
        count.textContent = selectedCards.size;
        if (selectedCards.size > 0) {
            bar.classList.add('visible');
        } else {
            bar.classList.remove('visible');
        }
    }

    // ===== 预览弹窗 =====
    function openPreview(fileId) {
        const item = VOD_MOCK.mediaList.find(m => m.fileId === fileId);
        if (!item) return;
        const modal = document.getElementById('mediaPreviewModal');
        document.getElementById('previewTitle').textContent = item.name;
        document.getElementById('previewMeta').innerHTML = `
            <span>时长：${formatDuration(item.duration)}</span>
            <span>分辨率：${item.resolution}</span>
            <span>大小：${formatSize(item.size)}</span>
            <span>上传时间：${item.createTime}</span>
        `;
        modal.classList.add('open');

        // 绘制预览画面
        const canvas = document.getElementById('previewCanvas');
        canvas.width = 800; canvas.height = 450;
        const idx = VOD_MOCK.mediaList.indexOf(item);
        drawMediaThumb(canvas, idx);
    }

    document.getElementById('previewClose').addEventListener('click', () => {
        document.getElementById('mediaPreviewModal').classList.remove('open');
    });
    document.getElementById('mediaPreviewModal').addEventListener('click', function(e) {
        if (e.target === this) this.classList.remove('open');
    });

    // ===== 发起任务 inline menu =====
    let activeInlineMenu = null;
    function showInlineTaskMenu(anchor, fileId) {
        closeAllDropdowns();
        // 创建临时下拉
        const menu = document.createElement('div');
        menu.className = 'task-dropdown-menu open';
        menu.style.position = 'fixed';
        const rect = anchor.getBoundingClientRect();
        menu.style.top = (rect.bottom + 6) + 'px';
        menu.style.left = rect.left + 'px';
        menu.innerHTML = `
            <button class="task-dropdown-item" data-route="create.html" data-feature="translate"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M4 10L7 4L10 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 8H9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><path d="M10 16L13 10L16 16" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 14H15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>视频译制</button>
            <button class="task-dropdown-item" data-route="create.html" data-feature="generate"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 2L12 7H17L13 10L14.5 15L10 12L5.5 15L7 10L3 7H8L10 2Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>AI 生成</button>
            <button class="task-dropdown-item" data-route="create.html" data-feature="livestream"><svg width="16" height="16" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.2"/><circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.2"/></svg>直播剪辑</button>
        `;
        document.body.appendChild(menu);
        activeInlineMenu = menu;

        menu.querySelectorAll('.task-dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                const route = item.dataset.route;
                const feature = item.dataset.feature;
                window.location.href = `${route}?feature=${feature}&vodFileId=${fileId}`;
            });
        });

        setTimeout(() => {
            document.addEventListener('click', function closeMenu() {
                if (activeInlineMenu) { activeInlineMenu.remove(); activeInlineMenu = null; }
                document.removeEventListener('click', closeMenu);
            }, { once: true });
        }, 10);
    }

    // ===== 下拉菜单通用 =====
    function closeAllDropdowns() {
        document.querySelectorAll('.task-dropdown-menu.open').forEach(m => m.classList.remove('open'));
        if (activeInlineMenu) { activeInlineMenu.remove(); activeInlineMenu = null; }
    }

    // 批量发起任务按钮
    document.getElementById('batchTaskBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        const menu = document.getElementById('batchTaskMenu');
        menu.classList.toggle('open');
    });
    document.getElementById('batchTaskMenu').querySelectorAll('.task-dropdown-item').forEach(item => {
        item.addEventListener('click', () => {
            const route = item.dataset.route;
            const feature = item.dataset.feature;
            const ids = Array.from(selectedCards).join(',');
            window.location.href = `${route}?feature=${feature}&vodFileIds=${ids}`;
        });
    });

    // 预览弹窗中的任务按钮
    document.getElementById('previewTaskBtn').addEventListener('click', function(e) {
        e.stopPropagation();
        const menu = document.getElementById('previewTaskMenu');
        menu.classList.toggle('open');
    });

    // ===== 应用切换 =====
    document.querySelectorAll('.media-app-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.media-app-tab').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            // 模拟切换
            selectedCards.clear();
            updateBatchBar();
            renderGrid(VOD_MOCK.mediaList);
        });
    });

    // ===== 筛选按钮 =====
    document.querySelectorAll('.media-filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.media-filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
        });
    });

    // ===== 搜索 =====
    document.getElementById('mediaSearch').addEventListener('input', function() {
        const q = this.value.trim().toLowerCase();
        document.querySelectorAll('.media-card').forEach(card => {
            const name = card.querySelector('.media-card-name').textContent.toLowerCase();
            card.style.display = name.includes(q) ? '' : 'none';
        });
    });

    // ===== 点击外部关闭下拉 =====
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.task-dropdown')) {
            closeAllDropdowns();
        }
    });

    // ===== 初始渲染 =====
    renderGrid(VOD_MOCK.mediaList);
    </script>

    <script src="app.js"></script>
</body>
</html>
