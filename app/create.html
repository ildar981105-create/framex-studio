<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成 — FrameX</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
    /* create.html 首页专属样式 */
    .create-home {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 32px;
        overflow-y: auto;
    }
    .create-home-header {
        text-align: center;
        margin-bottom: 48px;
    }
    .create-home-header h1 {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--text-primary);
        margin: 0 0 8px;
        letter-spacing: -0.02em;
    }
    .create-home-header p {
        font-size: 0.88rem;
        color: var(--text-muted);
        margin: 0;
    }
    .create-cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        width: 100%;
        max-width: 900px;
    }
    .create-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 40px 24px 36px;
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        color: inherit;
        position: relative;
        overflow: hidden;
    }
    .create-card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 20px;
        opacity: 0;
        transition: opacity 0.3s;
    }
    .create-card:hover {
        border-color: rgba(255,255,255,0.14);
        transform: translateY(-4px);
        box-shadow: 0 16px 48px rgba(0,0,0,0.3);
    }
    .create-card:hover::before {
        opacity: 1;
    }
    .create-card--translate::before {
        background: radial-gradient(ellipse at 50% 80%, rgba(16,185,129,0.08) 0%, transparent 70%);
    }
    .create-card--translate:hover {
        border-color: rgba(16,185,129,0.25);
    }
    .create-card--livestream::before {
        background: radial-gradient(ellipse at 50% 80%, rgba(249,115,22,0.08) 0%, transparent 70%);
    }
    .create-card--livestream:hover {
        border-color: rgba(249,115,22,0.25);
    }
    .create-card--generate::before {
        background: radial-gradient(ellipse at 50% 80%, rgba(168,85,247,0.08) 0%, transparent 70%);
    }
    .create-card--generate:hover {
        border-color: rgba(168,85,247,0.25);
    }
    .create-card-icon {
        width: 64px;
        height: 64px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .create-card--translate .create-card-icon {
        background: rgba(16,185,129,0.1);
        color: #34d399;
    }
    .create-card--livestream .create-card-icon {
        background: rgba(249,115,22,0.1);
        color: #fb923c;
    }
    .create-card--generate .create-card-icon {
        background: rgba(168,85,247,0.1);
        color: #c084fc;
    }
    .create-card-title {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--text-primary);
    }
    .create-card-desc {
        font-size: 0.78rem;
        color: var(--text-muted);
        text-align: center;
        line-height: 1.6;
    }
    .create-card-badge {
        position: absolute;
        top: 14px;
        right: 14px;
        font-size: 0.6rem;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 6px;
        background: rgba(16,185,129,0.12);
        color: #34d399;
        border: 1px solid rgba(16,185,129,0.2);
        letter-spacing: 0.02em;
    }
    .create-card-arrow {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-dim);
        transition: all 0.3s;
        margin-top: 4px;
    }
    .create-card:hover .create-card-arrow {
        color: var(--text-secondary);
    }
    .create-card:hover .create-card-arrow svg {
        transform: translateX(3px);
    }
    .create-card-arrow svg {
        transition: transform 0.3s;
    }
    @media (max-width: 720px) {
        .create-cards {
            grid-template-columns: 1fr;
            max-width: 400px;
        }
    }
    </style>
</head>
<body class="creator-layout">
    <!-- 侧边栏 -->
    <aside class="icon-sidebar">
        <a href="create.html" class="icon-sidebar-logo" title="FrameX">
            <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
                <rect x="2" y="2" width="28" height="28" rx="8" stroke="url(#sLogo)" stroke-width="2.5"/>
                <path d="M12 10L22 16L12 22V10Z" fill="url(#sLogo)"/>
                <defs><linearGradient id="sLogo" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#06b6d4"/></linearGradient></defs>
            </svg>
        </a>

        <nav class="icon-nav">
            <a href="create.html" class="icon-nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3L14 9H20L15 13L17 19L12 15L7 19L9 13L4 9H10L12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                生成
            </a>
            <a href="media.html" class="icon-nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 6C3 4.89543 3.89543 4 5 4H9L11 6H19C20.1046 6 21 6.89543 21 8V18C21 19.1046 20.1046 20 19 20H5C3.89543 20 3 19.1046 3 18V6Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                素材
            </a>
            <a href="result.html" class="icon-nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="3" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="14" width="7" height="7" rx="2" stroke="currentColor" stroke-width="1.5"/></svg>
                作品
            </a>
        </nav>

        <div class="icon-nav-divider"></div>

        <div class="icon-nav-bottom">
            <a href="#" class="icon-nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M13 10V3L4 14H11V21L20 10H13Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
                API
            </a>
            <a href="#" class="icon-nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M12 2V4M12 20V22M22 12H20M4 12H2M19.07 4.93L17.66 6.34M6.34 17.66L4.93 19.07M19.07 19.07L17.66 17.66M6.34 6.34L4.93 4.93" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                设置
            </a>
            <div class="icon-nav-avatar"><span>U</span></div>
        </div>
    </aside>

    <!-- ===== 默认首页视图 ===== -->
    <main class="creator-main" id="homeView">
        <div class="create-home">
            <div class="create-home-header">
                <h1>开启 AI 视频创作</h1>
                <p>选择一项能力，开始创作</p>
            </div>
            <div class="create-cards">
                <!-- 视频译制 -->
                <a href="translate-v6.html" class="create-card create-card--translate">
                    <span class="create-card-badge">热门</span>
                    <div class="create-card-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M5 12L9 5L13 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M6 10H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            <path d="M11 19L15 12L19 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M12 17H18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <span class="create-card-title">视频译制</span>
                    <span class="create-card-desc">自动翻译配音、口型同步、字幕生成，一键完成多语言视频本地化</span>
                    <span class="create-card-arrow">开始创作 <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <!-- 直播剪辑 -->
                <a href="livestream.html" class="create-card create-card--livestream">
                    <div class="create-card-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
                            <circle cx="5" cy="7" r="2.5" fill="#ef4444"/>
                        </svg>
                    </div>
                    <span class="create-card-title">直播剪辑</span>
                    <span class="create-card-desc">AI 智能识别直播高光时刻，自动剪辑精彩片段，快速产出短视频</span>
                    <span class="create-card-arrow">开始创作 <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
                <!-- AI 生成 -->
                <a href="generate.html" class="create-card create-card--generate">
                    <div class="create-card-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M12 3L14 9H20L15 13L17 19L12 15L7 19L9 13L4 9H10L12 3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span class="create-card-title">AI 生成</span>
                    <span class="create-card-desc">输入文本或图片，AI 自动生成高质量短视频，支持多种风格模板</span>
                    <span class="create-card-arrow">开始创作 <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
                </a>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
